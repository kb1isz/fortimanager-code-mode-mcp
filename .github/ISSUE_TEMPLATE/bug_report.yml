name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill in the details below.

  - type: input
    id: area
    attributes:
      label: Affected Area
      description: Which part of the project is affected?
      placeholder: "e.g., client, executor, server, search tool, execute tool"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: What happened? What did you expect to happen?
      placeholder: |
        **What happened:**
        ...

        **What I expected:**
        ...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Configure with FMG_API_VERSION=7.6
        2. Use the search tool with code: `specIndex.filter(...)`
        3. Observe error...
    validations:
      required: true

  - type: input
    id: fmg-version
    attributes:
      label: FortiManager Version
      placeholder: "e.g., 7.6.5"

  - type: input
    id: server-version
    attributes:
      label: MCP Server Version
      placeholder: "e.g., 1.0.0"

  - type: dropdown
    id: transport
    attributes:
      label: Transport Mode
      options:
        - stdio
        - http
        - "N/A"

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste any relevant log output (will be auto-formatted as code)
      render: shell
