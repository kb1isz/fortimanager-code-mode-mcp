services:
  fortimanager-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fortimanager-code-mode-mcp
    restart: unless-stopped
    ports:
      - "${MCP_HTTP_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - MCP_TRANSPORT=http
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
